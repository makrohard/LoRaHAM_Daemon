# LoRaHAM daemon shared lock directory.
#
# Holds the process-shared SPI-bus lock (spi0.lock) and the per-band instance
# ownership locks (instance-433.lock / instance-868.lock). It MUST be durable
# and independent of any single daemon instance: it is deliberately NOT a
# systemd RuntimeDirectory, because a per-unit RuntimeDirectory is removed when
# that unit stops, which would pull the shared lock inode out from under a still
# running peer and silently break cross-process SPI serialization.
#
# Install: copy to /etc/tmpfiles.d/loraham.conf, then
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/loraham.conf
#
# The public socket directory /run/loraham (audit item 3): root-owned,
# setgid group loraham, no group write — group members can connect (r-x
# traversal) but only root (the daemon) can create files, so no local user
# can plant a non-socket collision at a daemon socket pathname. Create the
# system group BEFORE running tmpfiles:
#   getent group loraham >/dev/null || sudo groupadd --system loraham
# Client users need membership: sudo usermod -aG loraham <user>
#
# Type Path                Mode UID  GID     Age Argument
d      /run/lock/loraham   0755 root root    -
d      /run/loraham        2750 root loraham -
