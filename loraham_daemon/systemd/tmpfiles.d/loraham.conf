# LoRaHAM daemon shared lock directory.
#
# Holds the process-shared SPI-bus lock (spi0.lock) and the per-band instance
# ownership locks (instance-433.lock / instance-868.lock). It MUST be durable
# and independent of any single daemon instance: it is deliberately NOT a
# systemd RuntimeDirectory, because a per-unit RuntimeDirectory is removed when
# that unit stops, which would pull the shared lock inode out from under a still
# running peer and silently break cross-process SPI serialization.
#
# Install: copy to /etc/tmpfiles.d/loraham.conf, then
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/loraham.conf
#
# The daemon runs unprivileged as the dedicated system user `loraham`; both
# directories are owned by that user so it can create lock files and sockets
# without root. The socket directory is setgid group loraham with no group
# write — client group members can connect (r-x traversal) but cannot create
# files, so no client can plant a non-socket collision at a socket pathname.
# Lock files themselves are owner-only 0600 (client group members can never
# hold them). Create user and group BEFORE running tmpfiles:
#   getent group loraham >/dev/null || sudo groupadd --system loraham
#   getent passwd loraham >/dev/null || \
#     sudo useradd --system -g loraham -G spi,gpio -M -s /usr/sbin/nologin loraham
# Client users need group membership: sudo usermod -aG loraham <user>
#
# Type Path                Mode UID     GID     Age Argument
d      /run/lock/loraham   0755 loraham loraham -
d      /run/loraham        2750 loraham loraham -
